server {
    listen 4173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Hashed build assets — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PWA artifacts that must always be fresh so updates roll out
    location = /sw.js              { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js      { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /workbox-config.js  { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Light hardening
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
